# paper_tag_visual_servo parameters for OARBot Blue
# -------------------------------------------------------
# Input: 3-D tag poses from paper_surface_estimator (or paper_tag_pose_fuser)
# Output: geometry_msgs/Twist on cmd_vel  (100 Hz, robot Cartesian base frame)

# ---------- topics ---------------------------------------------------------
surface_state_topic_name: "paper_surface_state"   # TagPoseArray, in camera frame
cmd_vel_topic_name:        "cmd_vel"               # to Kinova driver

# ---------- frames ---------------------------------------------------------
tf_robot_base_frame_name: "d1_tf_base_link"       # matches body_single_joint_follower2

# ---------- servoing goal --------------------------------------------------
# target_tag_id: -1  → servo toward the tag with the highest detection_score
#                >=0 → servo toward that specific ArUco ID
target_tag_id: -1

# Desired camera-to-tag distance along the camera optical axis [m]
standoff_distance_m: 0.35

# Also control arm orientation so the tag normal aligns with camera -Z axis
enable_orientation_control: true

# ---------- enable / disable -----------------------------------------------
enable_visual_servo: false          # start disabled; use the service to enable
toggle_visual_servo_service_name: "toggle_visual_servo"

# ---------- rate -----------------------------------------------------------
pub_rate: 100.0                     # Hz – Kinova arm REQUIRES 100 Hz

# ---------- deadzones -------------------------------------------------------
position_err_thres:    0.005        # m  (0.5 cm)
orientation_err_thres: 0.015        # rad

# ---------- proportional gains (K) ----------------------------------------
# Tuned conservatively; increase if convergence is too slow.
K_lin_x: 5.0
K_lin_y: 5.0
K_lin_z: 5.0
K_ang_x: 3.0
K_ang_y: 3.0
K_ang_z: 0.0                       # in-plane rotation: not controlled

# ---------- velocity-damping gains (D) ------------------------------------
D_lin_x: 5.0
D_lin_y: 5.0
D_lin_z: 5.0
D_ang_x: 3.0
D_ang_y: 3.0
D_ang_z: 0.0

# ---------- virtual mass (M) -----------------------------------------------
M_lin_x: 1.0
M_lin_y: 1.0
M_lin_z: 1.0
M_ang_x: 1.0
M_ang_y: 1.0
M_ang_z: 1.0

# ---------- velocity / acceleration limits ---------------------------------
max_lin_acc: 2.0                    # m/s²   (conservative; body_follower uses 5.0)
max_lin_vel: 0.15                   # m/s    (body_follower uses 0.5)
max_ang_acc: 2.0                    # rad/s²
max_ang_vel: 0.5                    # rad/s

# ---------- tag-loss timeout -----------------------------------------------
tag_timeout_sec: 0.5                # seconds before arm is stopped
